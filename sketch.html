<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Island Living</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Georgia, serif; background: #f5f5f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .frame {
    display: flex;
    width: 593px;
    height: 397px;
    border: 2px solid #222;
    border-radius: 3px;
    background: #fff;
  }
  .sidebar {
    width: 163px;
    border-right: 2px solid #222;
    padding: 12px 16px;
    flex-shrink: 0;
  }
  .sidebar h2 {
    font-size: 16px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px 24px;
    gap: 24px;
  }
  .circle {
    width: 120px;
    height: 120px;
    border: 2px solid #222;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    line-height: 1.3;
    font-size: 16px;
  }
  .body-text {
    font-size: 14px;
    line-height: 1.6;
    color: #333;
    text-align: center;
    max-width: 320px;
  }
</style>
</head>
<body>
  <div class="frame">
    <aside class="sidebar">
      <h2>Sketch</h2>
    </aside>
    <main class="content">
      <div class="circle">Island<br>Living</div>
      <p class="body-text">
        This is the life.<br>
        Add some random lorem ipsum<br>
        content here.
      </p>
    </main>
  </div>
</body>
</html>
